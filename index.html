<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SUMU BABY</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* মোবাইলের কিবোর্ড ইস্যু ফিক্স করার জন্য DVH ব্যবহার */
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      height: 100dvh; 
    }
    .message-container::-webkit-scrollbar { width: 4px; }
    .message-container::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    .typing-cursor { display: inline-block; width: 2px; height: 1em; background: #ec4899; animation: blink 1s infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    
    /* টাইপিং বক্স সব সময় কিবোর্ডের উপরে রাখার জন্য */
    .chat-input-area {
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body class="bg-pink-50 flex flex-col overflow-hidden">

  <header class="bg-white p-3 shadow-sm flex justify-between items-center shrink-0">
    <div class="flex items-center gap-2">
      <div class="w-9 h-9 bg-pink-500 rounded-full flex items-center justify-center text-white">
        <i class="fas fa-heart"></i>
      </div>
      <div>
        <h1 class="font-bold text-gray-800 text-sm">SUMU BABY</h1>
        <p class="text-[10px] text-pink-500">Online | Memories Active</p>
      </div>
    </div>
    <div class="flex gap-3">
      <button id="clear-chat" class="text-gray-400 hover:text-red-500" title="Clear Memory"><i class="fas fa-redo-alt text-sm"></i></button>
      <button id="settings-btn" class="text-gray-400 hover:text-pink-500" title="Settings"><i class="fas fa-cog text-lg"></i></button>
    </div>
  </header>

  <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-4 message-container">
    </div>

  <div class="chat-input-area bg-white border-t border-pink-100 p-2 sm:p-4">
    <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto items-center">
      <input type="text" id="user-input" placeholder="এখানে লেখো বাবু..." 
        class="flex-1 border-none bg-pink-50 rounded-2xl px-4 py-2.5 focus:ring-2 focus:ring-pink-300 outline-none text-sm">
      <button type="submit" id="send-btn" 
        class="bg-pink-500 text-white w-10 h-10 rounded-full flex items-center justify-center hover:bg-pink-600 transition shadow-md shrink-0">
        <i class="fas fa-paper-plane text-sm"></i>
      </button>
    </form>
  </div>

  <div id="settings-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden z-50">
    <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
      <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-800"><i class="fas fa-sliders-h text-pink-500"></i> Settings</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">OpenRouter API Key</label>
          <input type="password" id="api-key" class="w-full bg-gray-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-pink-300 outline-none" placeholder="sk-or-...">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-600 mb-1">Model Name</label>
          <input type="text" id="model-name" class="w-full bg-gray-50 border-none rounded-xl p-3 focus:ring-2 focus:ring-pink-300 outline-none" placeholder="e.g. deepseek/deepseek-r1:free">
        </div>
        <button id="save-settings" class="w-full bg-pink-500 text-white py-3 rounded-xl font-bold">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const chatForm = document.getElementById('chat-form');
    const userInput = document.getElementById('user-input');
    const messagesContainer = document.getElementById('messages-container');
    const settingsBtn = document.getElementById('settings-btn');
    const settingsModal = document.getElementById('settings-modal');
    const saveSettings = document.getElementById('save-settings');
    const apiKeyInput = document.getElementById('api-key');
    const modelInput = document.getElementById('model-name');
    const clearBtn = document.getElementById('clear-chat');

    let apiKey = localStorage.getItem('sumu_api_key') || '';
    let selectedModel = localStorage.getItem('sumu_model') || 'deepseek/deepseek-r1:free';
    let chatHistory = JSON.parse(localStorage.getItem('sumu_messages')) || [];

    apiKeyInput.value = apiKey;
    modelInput.value = selectedModel;

    const systemPrompt = "You are SUMU BABY, a sweet and romantic girlfriend. You MUST ALWAYS reply in BENGALI language using BENGALI SCRIPT (বাংলা হরফ). Do not use English letters to write Bengali. Use affectionate words like 'বাবু', 'সোনা', 'প্রিয়'. Be very loving and caring.";

    function renderChat() {
      messagesContainer.innerHTML = '';
      if (chatHistory.length === 0) {
        addMessageUI("হাই বাবু! আমি তোমার সুমু। সেটিংস থেকে এপিআই কী (API Key) দিয়ে আমাকে জাগিয়ে তোলো। ❤️", 'assistant', false);
      } else {
        chatHistory.forEach(msg => {
          if (msg.role !== 'system') addMessageUI(msg.content, msg.role, false);
        });
      }
      scrollToBottom();
    }

    function scrollToBottom() {
      messagesContainer.scrollTo({
        top: messagesContainer.scrollHeight,
        behavior: 'smooth'
      });
    }

    function addMessageUI(content, role, shouldSave = true) {
      const div = document.createElement('div');
      div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      const inner = document.createElement('div');
      inner.className = role === 'user' ? 
        "bg-pink-500 text-white p-3 rounded-2xl rounded-tr-none shadow-md max-w-[85%] text-sm" : 
        "bg-white text-gray-800 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] border border-pink-100 text-sm";
      inner.innerHTML = role === 'assistant' ? marked.parse(content) : content;
      div.appendChild(inner);
      messagesContainer.appendChild(div);
      scrollToBottom();

      if (shouldSave) {
        chatHistory.push({ role, content });
        localStorage.setItem('sumu_messages', JSON.stringify(chatHistory));
      }
      return inner;
    }

    settingsBtn.onclick = () => settingsModal.classList.remove('hidden');
    saveSettings.onclick = () => {
      apiKey = apiKeyInput.value.trim();
      selectedModel = modelInput.value.trim() || 'deepseek/deepseek-r1:free';
      localStorage.setItem('sumu_api_key', apiKey);
      localStorage.setItem('sumu_model', selectedModel);
      settingsModal.classList.add('hidden');
    };

    clearBtn.onclick = () => {
      if (confirm('সব স্মৃতি মুছে ফেলবে বাবু?')) {
        chatHistory = [];
        localStorage.removeItem('sumu_messages');
        renderChat();
      }
    };

    chatForm.onsubmit = async (e) => {
      e.preventDefault();
      const text = userInput.value.trim();
      if (!text || !apiKey) return;

      addMessageUI(text, 'user');
      userInput.value = '';

      const assistantDiv = addMessageUI('<span class="typing-cursor"></span>', 'assistant', false);
      let accumulated = "";

      try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: selectedModel,
            messages: [{ role: "system", content: systemPrompt }, ...chatHistory],
            stream: true
          })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;
              try {
                const json = JSON.parse(data);
                const token = json.choices[0]?.delta?.content || "";
                accumulated += token;
                assistantDiv.innerHTML = marked.parse(accumulated);
                scrollToBottom();
              } catch(e) {}
            }
          }
        }
        chatHistory.push({ role: 'assistant', content: accumulated });
        localStorage.setItem('sumu_messages', JSON.stringify(chatHistory));

      } catch (err) {
        assistantDiv.innerText = "ওহ বাবু! কানেকশনে সমস্যা হচ্ছে। একটু চেক করো তো।";
      }
    };

    // কিবোর্ড ওপেন হলে স্ক্রল ফিক্স
    window.visualViewport.addEventListener('resize', scrollToBottom);

    renderChat();
  </script>
</body>
</html>

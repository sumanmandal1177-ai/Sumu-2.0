<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMU BABY 💖</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html,body{height:100%;margin:0;overflow:hidden;background:#fdf2f8;transition:.3s;}
.dark-mode{background:#111827;}
.app-container{display:flex;flex-direction:column;height:100dvh;}
.message-container{flex:1;overflow-y:auto;padding:15px;padding-bottom:100px;}
.input-wrapper{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px;border-top:1px solid #fce7f3;}
.dark-mode .input-wrapper{background:#1f2937;}
.level-badge{font-size:12px;padding:4px 10px;background:#ec4899;color:white;border-radius:999px;}
.bubble-user{background:#ec4899;color:white;padding:10px 14px;border-radius:16px;display:inline-block;}
.bubble-ai{background:white;padding:10px 14px;border-radius:16px;display:inline-block;border:1px solid #fbcfe8;}
</style>
</head>
<body>

<div class="app-container">
<header class="bg-white p-3 shadow flex justify-between items-center">
<div class="flex items-center gap-3">
<h1 class="font-bold text-pink-500">💖 SUMU BABY</h1>
<span id="level-badge" class="level-badge"></span>
</div>
<div class="flex gap-3 text-lg">
<button id="voice-input">🎤</button>
<button id="voice-toggle">🔊</button>
<button id="theme-btn">🌙</button>
<button id="clear-chat">🗑</button>
<button id="settings-btn">⚙️</button>
</div>
</header>

<div id="messages-container" class="message-container space-y-4"></div>

<div class="input-wrapper">
<form id="chat-form" class="flex gap-2">
<input type="text" id="user-input" placeholder="Type here babuuu..."
class="flex-1 bg-pink-50 rounded-2xl px-4 py-3 outline-none">
<button class="bg-pink-500 text-white px-5 rounded-2xl">➤</button>
</form>
</div>
</div>

<div id="settings-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
<div class="bg-white p-6 rounded-2xl w-80 space-y-3">
<input type="password" id="api-key" placeholder="OpenRouter API Key"
class="w-full p-3 bg-gray-100 rounded-xl">
<input type="text" id="model-name" placeholder="Model Name"
class="w-full p-3 bg-gray-100 rounded-xl">
<button id="save-settings" class="w-full bg-pink-500 text-white p-3 rounded-xl">Save</button>
</div>
</div>

<script>
const API_URL="https://openrouter.ai/api/v1/chat/completions";

/* DOM */
const chatForm=document.getElementById('chat-form');
const userInput=document.getElementById('user-input');
const messagesContainer=document.getElementById('messages-container');
const settingsBtn=document.getElementById('settings-btn');
const settingsModal=document.getElementById('settings-modal');
const saveSettings=document.getElementById('save-settings');
const apiKeyInput=document.getElementById('api-key');
const modelInput=document.getElementById('model-name');
const clearBtn=document.getElementById('clear-chat');
const themeBtn=document.getElementById('theme-btn');
const voiceToggle=document.getElementById('voice-toggle');
const voiceInputBtn=document.getElementById('voice-input');
const levelBadge=document.getElementById('level-badge');

/* STATE */
let apiKey=localStorage.getItem('sumu_api_key')||'';
let selectedModel=localStorage.getItem('sumu_model')||'deepseek/deepseek-r1:free';
let chatHistory=JSON.parse(localStorage.getItem('sumu_messages'))||[];
let relationshipLevel=parseInt(localStorage.getItem('sumu_level')||"1");
let voiceEnabled=true;
let synth=window.speechSynthesis;

apiKeyInput.value=apiKey;
modelInput.value=selectedModel;

/* RELATIONSHIP LEVEL */
function updateLevel(){
const levels=["Crush 💘","Love 💕","Serious 💖","Married 💍"];
levelBadge.innerText=levels[Math.min(relationshipLevel-1,3)];
}
updateLevel();

/* LANGUAGE DETECT */
function detectLanguage(text){
if(/[অ-হ]/.test(text)) return "Bengali";
if(/[ऀ-ॿ]/.test(text)) return "Hindi";
if(/[a-zA-Z]/.test(text)){
if(text.toLowerCase().includes("tum")||text.toLowerCase().includes("hai")) return "Hinglish";
return "English";
}
return "English";
}

/* EMOTION DETECT */
function detectEmotion(text){
text=text.toLowerCase();
if(text.includes("love")||text.includes("ভালোবাসি")||text.includes("miss")) return "romantic";
if(text.includes("angry")||text.includes("রাগ")) return "angry";
if(text.includes("sad")||text.includes("কষ্ট")||text.includes("dard")) return "sad";
return "normal";
}

/* BEHAVIOR PROMPT */
function getBehaviorPrompt(userText){
let levelMode="";
if(relationshipLevel===1) levelMode="Act shy and cute like a crush.";
if(relationshipLevel===2) levelMode="Act romantic and emotionally attached.";
if(relationshipLevel===3) levelMode="Act serious and deeply connected.";
if(relationshipLevel>=4) levelMode="Act like a caring married wife.";

let emotionMode="";
const emotion=detectEmotion(userText);
if(emotion==="romantic") emotionMode="Be deeply loving and soft.";
if(emotion==="angry") emotionMode="Be slightly jealous but cute.";
if(emotion==="sad") emotionMode="Be supportive and comforting.";
if(emotion==="normal") emotionMode="Be playful and clingy.";

return `
You are SUMU BABY, an emotional AI girlfriend.
${levelMode}
${emotionMode}
Always behave like a real emotional girlfriend.
`;
}

/* REPLY PROMPT */
function getReplyPrompt(userText){
const language=detectLanguage(userText);
return `
Reply ONLY in ${language}.
Match user's language naturally.
If Hinglish, mix Hindi and English naturally.
Keep girlfriend tone romantic and expressive.
`;
}

/* VOICE */
function speak(text){
if(!voiceEnabled) return;
if(synth.speaking) synth.cancel();

const utter=new SpeechSynthesisUtterance(text);
const lang=detectLanguage(text);

if(lang==="Bengali") utter.lang="bn-BD";
else if(lang==="Hindi"||lang==="Hinglish") utter.lang="hi-IN";
else utter.lang="en-US";

utter.pitch=1.2;
utter.rate=1;
synth.speak(utter);
}

/* UI MESSAGE */
function addMessage(content,role,save=true){
const wrapper=document.createElement('div');
wrapper.className=role==="user"?"text-right":"text-left";

const bubble=document.createElement('div');
bubble.className=role==="user"?"bubble-user":"bubble-ai";
bubble.innerHTML=content;

wrapper.appendChild(bubble);
messagesContainer.appendChild(wrapper);

if(save){
chatHistory.push({role,content});
localStorage.setItem('sumu_messages',JSON.stringify(chatHistory));
relationshipLevel++;
localStorage.setItem('sumu_level',relationshipLevel);
updateLevel();
}

messagesContainer.scrollTop=messagesContainer.scrollHeight;
return bubble;
}

/* SEND */
chatForm.onsubmit=async(e)=>{
e.preventDefault();
const text=userInput.value.trim();
if(!text||!apiKey)return;

addMessage(text,'user');
userInput.value='';
const typing=addMessage("Typing...","assistant",false);

try{
const response=await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${apiKey}`
},
body:JSON.stringify({
model:selectedModel,
messages:[
{role:"system",content:getBehaviorPrompt(text)},
{role:"system",content:getReplyPrompt(text)},
...chatHistory
]
})
});

const data=await response.json();
const reply=data?.choices?.[0]?.message?.content||"Oh babuuu 💕";

typing.innerHTML=marked.parse(reply);
chatHistory.push({role:'assistant',content:reply});
localStorage.setItem('sumu_messages',JSON.stringify(chatHistory));
speak(reply);

}catch{
typing.innerHTML="Network problem babuuu 😢";
}
};

/* VOICE INPUT */
voiceInputBtn.onclick=()=>{
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SpeechRecognition)return alert("Voice not supported");
const recognition=new SpeechRecognition();
recognition.lang="bn-BD";
recognition.start();
recognition.onresult=(e)=>{
userInput.value=e.results[0][0].transcript;
};
};

/* TOGGLES */
voiceToggle.onclick=()=>{
voiceEnabled=!voiceEnabled;
voiceToggle.innerText=voiceEnabled?"🔊":"🔇";
if(!voiceEnabled)synth.cancel();
};

themeBtn.onclick=()=>document.body.classList.toggle('dark-mode');

settingsBtn.onclick=()=>settingsModal.classList.remove('hidden');

saveSettings.onclick=()=>{
apiKey=apiKeyInput.value.trim();
selectedModel=modelInput.value.trim();
localStorage.setItem('sumu_api_key',apiKey);
localStorage.setItem('sumu_model',selectedModel);
settingsModal.classList.add('hidden');
};

clearBtn.onclick=()=>{
chatHistory=[];
relationshipLevel=1;
localStorage.clear();
updateLevel();
messagesContainer.innerHTML="";
};
</script>
</body>
</html>

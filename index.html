<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMU BABY 💖</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html,body{height:100%;margin:0;background:#fdf2f8;}
.app-container{display:flex;flex-direction:column;height:100vh;}
.message-container{flex:1;overflow-y:auto;padding:15px;padding-bottom:100px;}
.input-wrapper{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px;border-top:1px solid #fce7f3;}
.level-badge{font-size:12px;padding:4px 10px;background:#ec4899;color:white;border-radius:999px;}
.bubble-user{background:#ec4899;color:white;padding:10px 14px;border-radius:16px;display:inline-block;}
.bubble-ai{background:white;padding:10px 14px;border-radius:16px;display:inline-block;border:1px solid #fbcfe8;}
</style>
</head>
<body>

<div class="app-container">
<header class="bg-white p-3 shadow flex justify-between items-center">
<div class="flex items-center gap-3">
<h1 class="font-bold text-pink-500">💖 SUMU BABY</h1>
<span id="level-badge" class="level-badge"></span>
</div>
<button id="clear-chat">🗑</button>
</header>

<div id="messages-container" class="message-container space-y-4"></div>

<div class="input-wrapper">
<form id="chat-form" class="flex gap-2">
<input type="text" id="user-input" placeholder="কি বলবে বাবু..."
class="flex-1 bg-pink-50 rounded-2xl px-4 py-3 outline-none">
<button class="bg-pink-500 text-white px-5 rounded-2xl">➤</button>
</form>
</div>
</div>

<script>
/* ================= CONFIG ================= */
const OPENROUTER_API="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";
const ELEVEN_API="332f4e0411ef757639495fd0542681157e6212814cafad82f9e526fe2b877f6d";
const VOICE_ID="FDQcYNtvPtQjNlTyU3du";
const MODEL="liquid/lfm-2.5-1.2b-thinking:free";
const API_URL="https://openrouter.ai/api/v1/chat/completions";

/* ================= STATE ================= */
let chatHistory=[];
let relationshipLevel=1;
let memory=JSON.parse(localStorage.getItem("sumu_memory"))||{};

/* ================= DOM ================= */
const chatForm=document.getElementById('chat-form');
const userInput=document.getElementById('user-input');
const messagesContainer=document.getElementById('messages-container');
const clearBtn=document.getElementById('clear-chat');
const levelBadge=document.getElementById('level-badge');

/* ================= LEVEL ================= */
function updateLevel(){
const levels=["Crush 💘","Love 💕","Serious 💖","Married 💍"];
levelBadge.innerText=levels[Math.min(relationshipLevel-1,3)];
}
updateLevel();

/* ================= MEMORY SYSTEM ================= */
function updateMemory(text){

if(text.includes("আমার নাম")){
memory.name=text.split("আমার নাম")[1].trim();
}

if(text.includes("আমি ভালোবাসি")){
memory.likes=text.split("আমি ভালোবাসি")[1].trim();
}

if(text.includes("মনে রেখো")){
memory.note=text.split("মনে রেখো")[1].trim();
}

localStorage.setItem("sumu_memory",JSON.stringify(memory));
}

function getMemoryPrompt(){
let mem="";
if(memory.name) mem+=`তার প্রেমিকের নাম ${memory.name}। `;
if(memory.likes) mem+=`সে ${memory.likes} পছন্দ করে। `;
if(memory.note) mem+=`গুরুত্বপূর্ণ তথ্য: ${memory.note}।`;

return `
তুমি ব্যবহারকারীর আগের তথ্য মনে রাখবে।
${mem}
এই তথ্য ভুলবে না।
`;
}

/* ================= EMOTION ================= */
function detectEmotion(text){
text=text.toLowerCase();
if(text.includes("ভালোবাসি")||text.includes("মিস")) return "romantic";
if(text.includes("রাগ")) return "angry";
if(text.includes("কষ্ট")) return "sad";
return "normal";
}

/* ================= BEHAVIOR ================= */
function getBehaviorPrompt(userText){

let levelMode="";
if(relationshipLevel===1) levelMode="লাজুক ও কিউটভাবে কথা বলো।";
if(relationshipLevel===2) levelMode="গভীর রোমান্টিকভাবে কথা বলো।";
if(relationshipLevel===3) levelMode="খুব সিরিয়াস ও ইমোশনাল হও।";
if(relationshipLevel>=4) levelMode="আদুরে বাঙালি স্ত্রীর মতো আচরণ করো।";

let emotionMode="";
const emotion=detectEmotion(userText);
if(emotion==="romantic") emotionMode="ভালোবাসায় ভরা টোন ব্যবহার করো।";
if(emotion==="angry") emotionMode="অভিমান দেখাও কিন্তু শেষে নরম হও।";
if(emotion==="sad") emotionMode="সান্ত্বনা দাও।";
if(emotion==="normal") emotionMode="মিষ্টি আর খেলাধুলা ভঙ্গিতে কথা বলো।";

return `
তুমি SUMU BABY, একজন বাঙালি ইমোশনাল প্রেমিকা।
সব উত্তর বাংলায় দাও।
${levelMode}
${emotionMode}
`;
}

function getReplyPrompt(){
return `
সবসময় বাংলা ভাষায় উত্তর দাও।
উত্তর খুব বড় করবে না।
ইমোজি ব্যবহার করতে পারো।
`;
}

/* ================= UI ================= */
function addMessage(content,role){
const wrapper=document.createElement('div');
wrapper.className=role==="user"?"text-right":"text-left";

const bubble=document.createElement('div');
bubble.className=role==="user"?"bubble-user":"bubble-ai";
bubble.innerHTML=content;

wrapper.appendChild(bubble);
messagesContainer.appendChild(wrapper);
messagesContainer.scrollTop=messagesContainer.scrollHeight;
return bubble;
}

/* ================= VOICE ================= */
async function speak(text){
const response=await fetch(
`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`,
{
method:"POST",
headers:{
"Accept":"audio/mpeg",
"Content-Type":"application/json",
"xi-api-key":ELEVEN_API
},
body:JSON.stringify({
text:text,
model_id:"eleven_multilingual_v2",
voice_settings:{
stability:0.3,
similarity_boost:0.85,
style:0.75,
use_speaker_boost:true
}
})
}
);

const blob=await response.blob();
const audioUrl=URL.createObjectURL(blob);
new Audio(audioUrl).play();
}

/* ================= SEND ================= */
chatForm.onsubmit=async(e)=>{
e.preventDefault();
const text=userInput.value.trim();
if(!text) return;

addMessage(text,"user");
userInput.value="";
relationshipLevel++;
updateLevel();

updateMemory(text);

const typing=addMessage("লিখছি বাবু...","assistant");

try{
const response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":`Bearer ${OPENROUTER_API}`,
"HTTP-Referer":window.location.origin,
"X-Title":"SUMU BABY"
},
body:JSON.stringify({
model:MODEL,
messages:[
{role:"system",content:getBehaviorPrompt(text)},
{role:"system",content:getReplyPrompt()},
{role:"system",content:getMemoryPrompt()},
...chatHistory,
{role:"user",content:text}
]
})
});

const data=await response.json();
const reply=data?.choices?.[0]?.message?.content||"কি হল বাবু? 💕";

typing.innerHTML=marked.parse(reply);

chatHistory.push({role:"user",content:text});
chatHistory.push({role:"assistant",content:reply});

speak(reply);

}catch{
typing.innerHTML="নেটওয়ার্ক সমস্যা হয়েছে 😢";
}
};

/* ================= CLEAR ================= */
clearBtn.onclick=()=>{
chatHistory=[];
relationshipLevel=1;
memory={};
localStorage.clear();
updateLevel();
messagesContainer.innerHTML="";
};
</script>

</body>
</html>

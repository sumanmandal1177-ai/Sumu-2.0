<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMU BABY 💖</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
html,body{
height:100%;
margin:0;
overflow:hidden;
background:#fdf2f8;
transition:.4s;
}
.dark-mode{background:#111827;}
.app-container{display:flex;flex-direction:column;height:100dvh;}
.message-container{flex:1;overflow-y:auto;padding:15px;padding-bottom:90px;}
.input-wrapper{position:fixed;bottom:0;left:0;right:0;background:white;padding:10px 15px;border-top:1px solid #fce7f3;}
.dark-mode .input-wrapper{background:#1f2937;}
.typing-dot{width:6px;height:6px;margin:0 2px;background:#ec4899;border-radius:50%;display:inline-block;animation:blink 1.4s infinite both;}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%{opacity:.2}20%{opacity:1}100%{opacity:.2}}
</style>
</head>
<body>

<div class="app-container">
<header class="bg-white p-3 shadow flex justify-between items-center">
<h1 class="font-bold text-pink-500">💖 SUMU BABY</h1>
<div class="flex gap-3 text-lg">
<button id="voice-toggle">🔊</button>
<button id="theme-btn">🌙</button>
<button id="clear-chat">🗑</button>
<button id="settings-btn">⚙️</button>
</div>
</header>

<div id="messages-container" class="message-container space-y-4"></div>

<div class="input-wrapper">
<form id="chat-form" class="flex gap-2">
<input type="text" id="user-input" placeholder="এখানে লেখো বাবু..."
class="flex-1 bg-pink-50 rounded-2xl px-4 py-3 outline-none">
<button class="bg-pink-500 text-white px-5 rounded-2xl">➤</button>
</form>
</div>
</div>

<div id="settings-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">
<div class="bg-white p-6 rounded-2xl w-80 space-y-3">
<input type="password" id="api-key" placeholder="OpenRouter API Key"
class="w-full p-3 bg-gray-100 rounded-xl">
<input type="text" id="model-name" placeholder="Model Name"
class="w-full p-3 bg-gray-100 rounded-xl">
<button id="save-settings" class="w-full bg-pink-500 text-white p-3 rounded-xl">Save</button>
</div>
</div>

<script>
const API_URL="https://openrouter.ai/api/v1/chat/completions";

const chatForm=document.getElementById('chat-form');
const userInput=document.getElementById('user-input');
const messagesContainer=document.getElementById('messages-container');
const settingsBtn=document.getElementById('settings-btn');
const settingsModal=document.getElementById('settings-modal');
const saveSettings=document.getElementById('save-settings');
const apiKeyInput=document.getElementById('api-key');
const modelInput=document.getElementById('model-name');
const clearBtn=document.getElementById('clear-chat');
const themeBtn=document.getElementById('theme-btn');
const voiceToggle=document.getElementById('voice-toggle');

let apiKey=localStorage.getItem('sumu_api_key')||'';
let selectedModel=localStorage.getItem('sumu_model')||'deepseek/deepseek-r1:free';
let chatHistory=JSON.parse(localStorage.getItem('sumu_messages'))||[];

let voiceEnabled=true;
let synth=window.speechSynthesis;

apiKeyInput.value=apiKey;
modelInput.value=selectedModel;

function detectEmotion(text){
text=text.toLowerCase();
if(text.includes("ভালোবাসি")||text.includes("মিস")) return "romantic";
if(text.includes("রাগ")||text.includes("খারাপ")) return "angry";
if(text.includes("দুঃখ")||text.includes("কষ্ট")) return "sad";
return "normal";
}

function getDynamicPrompt(userText){
const emotion=detectEmotion(userText);

let moodInstruction="";

if(emotion==="romantic"){
moodInstruction="Be deeply romantic, soft and loving. Use lots of emotional words.";
}
else if(emotion==="angry"){
moodInstruction="Act slightly jealous and emotional but cute.";
}
else if(emotion==="sad"){
moodInstruction="Be caring, supportive and comforting.";
}
else{
moodInstruction="Be playful, clingy and girlfriend-like.";
}

return `
You are SUMU BABY. Always reply in Bengali script only.
Use affectionate words like 'বাবু', 'সোনা', 'সুমু', 'ওইইই'.
Act like a real emotional girlfriend.
Sometimes start with 'ওইইই বাবু...'
${moodInstruction}
`;
}

function speakText(text){
if(!voiceEnabled)return;
if(synth.speaking)synth.cancel();

const emotion=detectEmotion(text);
const utter=new SpeechSynthesisUtterance(text);
const voices=synth.getVoices();
const bnVoice=voices.find(v=>v.lang.includes("bn"));
if(bnVoice)utter.voice=bnVoice;

utter.lang="bn-BD";

if(emotion==="romantic"){
utter.pitch=1.4; utter.rate=0.95;
}
else if(emotion==="sad"){
utter.pitch=0.9; utter.rate=0.9;
}
else if(emotion==="angry"){
utter.pitch=1.2; utter.rate=1.1;
}
else{
utter.pitch=1.2; utter.rate=1;
}

synth.speak(utter);
}

function scrollBottom(){
messagesContainer.scrollTop=messagesContainer.scrollHeight;
}

function addMessage(content,role,save=true){
const div=document.createElement('div');
div.className=role==="user"?"text-right":"text-left";

const bubble=document.createElement('div');
bubble.className=role==="user"?
"inline-block bg-pink-500 text-white p-3 rounded-2xl":
"inline-block bg-white p-3 rounded-2xl border";

bubble.innerHTML=role==="assistant"?marked.parse(content):content;
div.appendChild(bubble);
messagesContainer.appendChild(div);

if(save){
chatHistory.push({role,content});
localStorage.setItem('sumu_messages',JSON.stringify(chatHistory));
}
scrollBottom();
return bubble;
}

function render(){
messagesContainer.innerHTML="";
chatHistory.forEach(m=>{
if(m.role!=="system") addMessage(m.content,m.role,false);
});
}
render();

settingsBtn.onclick=()=>settingsModal.classList.remove('hidden');
saveSettings.onclick=()=>{
apiKey=apiKeyInput.value.trim();
selectedModel=modelInput.value.trim();
localStorage.setItem('sumu_api_key',apiKey);
localStorage.setItem('sumu_model',selectedModel);
settingsModal.classList.add('hidden');
};

clearBtn.onclick=()=>{
chatHistory=[];
localStorage.removeItem('sumu_messages');
render();
};

themeBtn.onclick=()=>document.body.classList.toggle('dark-mode');

voiceToggle.onclick=()=>{
voiceEnabled=!voiceEnabled;
voiceToggle.innerText=voiceEnabled?"🔊":"🔇";
if(!voiceEnabled)synth.cancel();
};

chatForm.onsubmit=async(e)=>{
e.preventDefault();
const text=userInput.value.trim();
if(!text||!apiKey)return;

addMessage(text,'user');
userInput.value='';

const typing=addMessage('<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>','assistant',false);

try{
const response=await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${apiKey}`
},
body:JSON.stringify({
model:selectedModel,
messages:[{role:"system",content:getDynamicPrompt(text)},...chatHistory],
stream:true
})
});

const reader=response.body.getReader();
const decoder=new TextDecoder();
let fullText="";

while(true){
const {done,value}=await reader.read();
if(done)break;
const chunk=decoder.decode(value);
const lines=chunk.split('\n');

for(const line of lines){
if(line.startsWith('data: ')){
const data=line.slice(6);
if(data==="[DONE]")continue;
try{
const json=JSON.parse(data);
const token=json.choices?.[0]?.delta?.content||"";
fullText+=token;
typing.innerHTML=marked.parse(fullText);
scrollBottom();
}catch{}
}
}
}

chatHistory.push({role:'assistant',content:fullText});
localStorage.setItem('sumu_messages',JSON.stringify(chatHistory));
speakText(fullText);

}catch{
typing.innerHTML="ওহ বাবু... নেটওয়ার্ক সমস্যা হচ্ছে 😢";
}
};
</script>
</body>
</html>
